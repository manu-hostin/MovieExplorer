<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Movie Explorer</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="catalog.html">Catálogo</a>
            <button id="theme-toggle">🌓</button>
        </nav>
    </header>

    <main>
        <section class="filtro">
            <label for="genero">Filtrar por Gênero:</label>
            <select id="genero">
                <option value="all">Todos</option>
            </select>
        </section>

        <section class="catalogo">
            <div id="cards-catalogo" class="cards-container">
                <div class="card">
                    <img src="https://image.tmdb.org/t/p/w500/abc123.jpg" alt="Nome do Filme">
                    <h3>Meu Filme Favorito</h3>
                    <p>Sinopse curta do filme mostrando o que acontece na história.</p>
                    <a href="detail.html?id=1">Ver Detalhes</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Movie Explorer. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
